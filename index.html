<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cybersecurity Portfolio for [Your Name]"
    />
    <!-- CTF Theme: JetBrains Mono font -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <title>Malworld | Cybersecurity Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ═══════════════════════════════════════════════════════════
         CTF THEME OVERLAY + BOOT SCREEN
         Self-contained block — does not touch any React components.
         ═══════════════════════════════════════════════════════════ -->
    <style>
      /* ── 1. GLOBAL FONT & BASE ───────────────────────────────── */
      :root {
        --ctf-green:  #00ff41;
        --ctf-cyan:   #00d4ff;
        --ctf-bg:     #0d0d0d;
        --ctf-card-bg:#0f1923;
        --ctf-border: rgba(0, 255, 65, 0.35);
      }

      *, *::before, *::after {
        font-family: 'JetBrains Mono', 'Fira Code', monospace !important;
      }

      html, body {
        background-color: var(--ctf-bg) !important;
        color: #c9d1d9 !important;
      }

      /* ── 2. CRT SCANLINE OVERLAY ─────────────────────────────── */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 9998;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 3px,
          rgba(0,0,0,0.18) 3px,
          rgba(0,0,0,0.18) 4px
        );
        animation: scanShift 10s linear infinite;
      }

      @keyframes scanShift {
        0%   { background-position: 0 0; }
        100% { background-position: 0 100px; }
      }

      /* ── 3. MATRIX RAIN CANVAS ───────────────────────────────── */
      #ctf-matrix-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0.06;
      }

      /* ── 4. GLITCH ANIMATION ON HEADINGS ─────────────────────── */
      @keyframes ctfGlitch {
        0%   { text-shadow: none; clip-path: none; }
        10%  { text-shadow: 2px 0 var(--ctf-cyan), -2px 0 #ff0055; transform: translate(-2px,0); }
        20%  { text-shadow: -2px 0 var(--ctf-green), 2px 0 #ff0055; transform: translate(2px,0); }
        30%  { text-shadow: none; transform: translate(0,0); }
        100% { text-shadow: none; clip-path: none; }
      }

      h1:hover, h2:hover, h3:hover {
        animation: ctfGlitch 0.4s steps(1) !important;
        cursor: default;
      }

      /* ── 5. TERMINAL NAV BADGE ────────────────────────────────── */
      #ctf-nav-badge {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9000;
        padding: 6px 14px;
        font-size: 12px;
        color: var(--ctf-green);
        background: rgba(0,0,0,0.7);
        border-bottom: 1px solid var(--ctf-border);
        border-right: 1px solid var(--ctf-border);
        border-bottom-right-radius: 8px;
        letter-spacing: 0.04em;
        pointer-events: none;
        user-select: none;
      }

      #ctf-nav-badge span.prompt-cyan {
        color: var(--ctf-cyan);
      }
      #ctf-nav-badge span.prompt-blink {
        animation: ctfBlink 1s step-end infinite;
        color: var(--ctf-green);
      }

      /* ── 6. HERO BLINKING CURSOR ──────────────────────────────── */
      @keyframes ctfBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      .ctf-cursor::after {
        content: '▋';
        color: var(--ctf-green);
        animation: ctfBlink 1s step-end infinite;
        margin-left: 2px;
      }

      /* ── 7. CTF CHALLENGE CARD SYSTEM ────────────────────────── */
      .ctf-challenge-card {
        position: relative !important;
        border-left: 3px solid var(--ctf-green) !important;
        border-color: rgba(0,255,65,0.25) !important;
        background: #0f1923 !important;
        transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
      }

      .ctf-challenge-card:hover {
        box-shadow: 0 0 22px rgba(0,255,65,0.12), inset 0 0 30px rgba(0,212,255,0.03);
        border-left-color: var(--ctf-green) !important;
        transform: translateY(-1px);
      }

      /* Top-right meta row: category + difficulty stacked */
      .ctf-card-meta {
        position: absolute;
        top: 8px;
        right: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        pointer-events: none;
        z-index: 10;
      }

      /* Category badge: Web / Pwn / Forensics / Crypto / Misc */
      .ctf-cat-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 3px;
        text-transform: uppercase;
        border: 1px solid;
      }
      .ctf-cat-web     { color: #00d4ff; background: rgba(0,212,255,0.10); border-color: rgba(0,212,255,0.35); }
      .ctf-cat-pwn     { color: #ff4466; background: rgba(255,68,102,0.10); border-color: rgba(255,68,102,0.35); }
      .ctf-cat-forensics { color: #c084fc; background: rgba(192,132,252,0.10); border-color: rgba(192,132,252,0.35); }
      .ctf-cat-crypto  { color: #fbbf24; background: rgba(251,191,36,0.10); border-color: rgba(251,191,36,0.35); }
      .ctf-cat-misc    { color: #94a3b8; background: rgba(148,163,184,0.08); border-color: rgba(148,163,184,0.25); }

      /* Difficulty badge */
      .ctf-diff-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 2px 7px;
        border-radius: 3px;
        text-transform: uppercase;
        border: 1px solid;
      }
      .ctf-diff-hard   { color: #ff4444; background: rgba(255,68,68,0.10); border-color: rgba(255,68,68,0.4); }
      .ctf-diff-medium { color: #f59e0b; background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.4); }
      .ctf-diff-easy   { color: #00ff41; background: rgba(0,255,65,0.10);  border-color: rgba(0,255,65,0.4);  }

      /* pts label — bottom-left */
      .ctf-pts-label {
        position: absolute;
        bottom: 8px;
        left: 14px;
        font-size: 10px;
        font-weight: 700;
        color: var(--ctf-cyan);
        letter-spacing: 0.05em;
        pointer-events: none;
        z-index: 10;
        opacity: 0.85;
      }

      /* UNSOLVED / SOLVED toggle — bottom-right */
      .ctf-solve-toggle {
        position: absolute;
        bottom: 8px;
        right: 10px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 2px 8px;
        border-radius: 3px;
        border: 1px solid rgba(255,68,68,0.5);
        color: #ff4444;
        background: rgba(255,68,68,0.08);
        cursor: pointer;
        z-index: 10;
        transition: all 0.2s ease;
        user-select: none;
      }
      .ctf-solve-toggle.solved {
        color: var(--ctf-green);
        background: rgba(0,255,65,0.08);
        border-color: rgba(0,255,65,0.4);
      }
      .ctf-solve-toggle.solving {
        animation: ctfSolvePulse 0.4s ease;
      }
      @keyframes ctfSolvePulse {
        0%   { transform: scale(1); opacity: 1; }
        40%  { transform: scale(1.15); opacity: 0.6; }
        100% { transform: scale(1); opacity: 1; }
      }

      /* Keep existing pts badge from step-1 hidden — replaced by ctf-pts-label */
      .ctf-pts-badge { display: none !important; }

      /* ── 8. XP SKILL BAR ANIMATION ───────────────────────────── */
      @keyframes xpFill {
        from { background-position: 200% center; }
        to   { background-position: -200% center; }
      }

      [class*="skill"] div[style*="width"],
      [class*="progress"] > div,
      [role="progressbar"] > div {
        background: linear-gradient(90deg,
          var(--ctf-green) 0%,
          var(--ctf-cyan)  50%,
          var(--ctf-green) 100%) !important;
        background-size: 200% auto !important;
        animation: xpFill 3s linear infinite !important;
        box-shadow: 0 0 8px rgba(0,255,65,0.4) !important;
      }

      /* ── 9. BOOT SCREEN ───────────────────────────────────────── */
      #ctf-boot-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 10vw;
        box-sizing: border-box;
        transition: opacity 0.7s ease;
      }

      #ctf-boot-screen.ctf-fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #ctf-boot-lines {
        line-height: 2;
        font-size: clamp(13px, 2vw, 16px);
        white-space: pre;
      }

      #ctf-boot-lines .ok {
        color: var(--ctf-green);
      }

      #ctf-boot-lines .boot-line {
        color: #ffffff;
        display: block;
      }

      #ctf-boot-cursor {
        display: inline-block;
        width: 9px;
        height: 1.1em;
        background: var(--ctf-green);
        vertical-align: text-bottom;
        animation: ctfBlink 0.7s step-end infinite;
        margin-left: 2px;
      }
    </style>

    <!-- BOOT SCREEN MARKUP -->
    <div id="ctf-boot-screen">
      <div id="ctf-boot-lines"></div>
      <span id="ctf-boot-cursor"></span>
    </div>

    <!-- TERMINAL NAV BADGE -->
    <div id="ctf-nav-badge">
      <span class="prompt-cyan">~/malworld</span> $ <span class="prompt-blink">▋</span>
    </div>

    <!-- MATRIX RAIN CANVAS -->
    <canvas id="ctf-matrix-canvas"></canvas>

    <script>
    (function () {
      'use strict';

      /* ─────────────────────────────────────────────────────────
         A. MATRIX RAIN
      ───────────────────────────────────────────────────────── */
      const canvas  = document.getElementById('ctf-matrix-canvas');
      const ctx     = canvas.getContext('2d');
      const CHARS   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>/\\|{}[]アイウエオカキクケコサシスセソ';
      let cols, drops;

      function resizeMatrix() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        cols  = Math.floor(canvas.width / 16);
        drops = Array.from({ length: cols }, () => Math.random() * -50);
      }

      function drawMatrix() {
        ctx.fillStyle = 'rgba(13,13,13,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff41';
        ctx.font = '14px "JetBrains Mono", monospace';
        drops.forEach((y, i) => {
          const char = CHARS[Math.floor(Math.random() * CHARS.length)];
          ctx.fillText(char, i * 16, y * 16);
          if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i] += 0.5;
        });
      }

      window.addEventListener('resize', resizeMatrix);
      resizeMatrix();
      setInterval(drawMatrix, 55);

      /* ─────────────────────────────────────────────────────────
         B. CTF CHALLENGE CARD DECORATOR  (runs after React mounts)
      ───────────────────────────────────────────────────────── */

      // ── Category keyword map ──────────────────────────────────
      const CAT_RULES = [
        { cat: 'pwn',      cls: 'ctf-cat-pwn',
          kw: ['exploit','penetration','pentest','pentest','vapt','metasploit','burp suite',
               'nmap','nessus','payload','shellcode','buffer overflow','rce','privilege',
               'attack','malware','keylogger','honeypot'] },
        { cat: 'forensics', cls: 'ctf-cat-forensics',
          kw: ['forensic','autopsy','ftk','encase','wireshark','incident response',
               'digital forensics','cybercrime','investigat'] },
        { cat: 'crypto',   cls: 'ctf-cat-crypto',
          kw: ['crypto','cryptograph','cipher','hash','otp','encryption','decryption','key'] },
        { cat: 'web',      cls: 'ctf-cat-web',
          kw: ['web','http','sql injection','xss','burp','injection','api','medium',
               'bazaar','network traffic','packet','scapy'] },
        { cat: 'misc',     cls: 'ctf-cat-misc',
          kw: ['training','lecture','awareness','education','event','workshop','teaching',
               'degree','university','certification','comptia','ai','automation','machine learning'] },
      ];

      // ── Difficulty keyword map ────────────────────────────────
      const DIFF_RULES = [
        { diff: 'HARD',   cls: 'ctf-diff-hard',
          kw: ['advanced','enterprise','critical','autonomous','ai','framework',
               'metasploit','exploit','malware','penetration','shellcode','bypass',
               'wireshark','autopsy','ftk','encase','rce','privilege'] },
        { diff: 'MEDIUM', cls: 'ctf-diff-medium',
          kw: ['vapt','assessment','scan','vulnerability','nmap','nessus','burp',
               'forensics','incident','analysis','detection','monitor','blackice'] },
      ];

      // Points pool varies by category
      const PTS_BY_CAT = { pwn: [500,400,450], forensics: [350,400,300], crypto: [300,350], web: [250,300,200], misc: [100,150,200] };
      let cardSeq = 0;

      function inferCategory(text) {
        const t = text.toLowerCase();
        for (const rule of CAT_RULES) {
          if (rule.kw.some(k => t.includes(k))) return rule;
        }
        return { cat: 'misc', cls: 'ctf-cat-misc' };
      }

      function inferDifficulty(text) {
        const t = text.toLowerCase();
        for (const rule of DIFF_RULES) {
          if (rule.kw.some(k => t.includes(k))) return rule;
        }
        return { diff: 'EASY', cls: 'ctf-diff-easy' };
      }

      function pickPts(cat) {
        const pool = PTS_BY_CAT[cat] || [200];
        return pool[cardSeq % pool.length];
      }

      function makeSolveToggle() {
        const btn = document.createElement('span');
        btn.className = 'ctf-solve-toggle';
        btn.textContent = '[ UNSOLVED ]';
        btn.title = 'Click to toggle solved state';
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          const solved = this.classList.toggle('solved');
          this.classList.add('solving');
          this.textContent = solved ? '[ SOLVED ]' : '[ UNSOLVED ]';
          setTimeout(() => this.classList.remove('solving'), 400);
        });
        return btn;
      }

      function decorateCards() {
        // All card-like elements across every page
        const cards = document.querySelectorAll(
          '#root button.text-left, ' +
          '#root div[class*="rounded-lg"], ' +
          '#root div[class*="rounded-xl"], ' +
          '#root a[class*="rounded-lg"], ' +
          '#root a[class*="rounded-xl"]'
        );

        cards.forEach(card => {
          if (card.dataset.ctfDone) return;
          card.dataset.ctfDone = '1';
          card.classList.add('ctf-challenge-card');

          // Collect readable text from this card for keyword analysis
          const text = card.innerText || card.textContent || '';

          const catInfo  = inferCategory(text);
          const diffInfo = inferDifficulty(text);
          const pts      = pickPts(catInfo.cat);
          cardSeq++;

          // ── Top-right meta block (category + difficulty) ──
          const meta = document.createElement('div');
          meta.className = 'ctf-card-meta';

          const catBadge = document.createElement('span');
          catBadge.className = 'ctf-cat-badge ' + catInfo.cls;
          catBadge.textContent = catInfo.cat;
          meta.appendChild(catBadge);

          const diffBadge = document.createElement('span');
          diffBadge.className = 'ctf-diff-badge ' + diffInfo.cls;
          diffBadge.textContent = 'difficulty: ' + diffInfo.diff;
          meta.appendChild(diffBadge);

          card.appendChild(meta);

          // ── Bottom-left pts ───────────────────────────────
          const ptsLabel = document.createElement('span');
          ptsLabel.className = 'ctf-pts-label';
          ptsLabel.textContent = 'points: ' + pts;
          card.appendChild(ptsLabel);

          // ── Bottom-right UNSOLVED toggle ──────────────────
          card.appendChild(makeSolveToggle());
        });

        // Blinking cursor on h1 (hero name)
        document.querySelectorAll('#root h1').forEach(h1 => {
          if (!h1.dataset.ctfCursor) {
            h1.dataset.ctfCursor = '1';
            h1.classList.add('ctf-cursor');
          }
        });
      }

      // Re-run whenever React re-renders a page
      const observer = new MutationObserver(decorateCards);
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      setTimeout(decorateCards, 800);

      /* ─────────────────────────────────────────────────────────
         C. BOOT SCREEN  (session-once)
      ───────────────────────────────────────────────────────── */
      const bootEl   = document.getElementById('ctf-boot-screen');
      const linesEl  = document.getElementById('ctf-boot-lines');
      const cursorEl = document.getElementById('ctf-boot-cursor');

      const BOOT_LINES = [
        { text: '[SYSTEM BOOT] MALWORLD OS v2.0', ok: false },
        { text: '[OK] Loading exploit modules...',   ok: true  },
        { text: '[OK] Initializing recon engine...', ok: true  },
        { text: '[OK] CTF toolkit ready',            ok: true  },
        { text: '[OK] Payload builder armed',        ok: true  },
        { text: 'ACCESS GRANTED — Welcome, operator.', ok: false },
      ];

      const CHAR_DELAY = 80;   // ms per character
      const POST_PAUSE = 1200; // ms after last line before fade

      function alreadyShown() {
        try { return sessionStorage.getItem('ctf-boot-shown') === '1'; } catch(e) { return false; }
      }
      function markShown() {
        try { sessionStorage.setItem('ctf-boot-shown', '1'); } catch(e) {}
      }

      function typeLines(lines, onDone) {
        let lineIdx = 0, charIdx = 0, lineSpan = null;

        function next() {
          if (lineIdx >= lines.length) { onDone(); return; }

          const line = lines[lineIdx];

          if (charIdx === 0) {
            lineSpan = document.createElement('span');
            lineSpan.className = 'boot-line';
            linesEl.appendChild(lineSpan);
          }

          const fullText = line.text;
          const ch = fullText[charIdx];

          // If this line has [OK] prefix, colour it
          if (line.ok && charIdx < 4) {
            // append to an inner .ok span
            let okSpan = lineSpan.querySelector('.ok');
            if (!okSpan) {
              okSpan = document.createElement('span');
              okSpan.className = 'ok';
              lineSpan.appendChild(okSpan);
            }
            okSpan.textContent += ch;
          } else {
            // plain text node at end of lineSpan
            let textNode = lineSpan.lastChild;
            if (!textNode || textNode.nodeType !== Node.TEXT_NODE) {
              textNode = document.createTextNode('');
              lineSpan.appendChild(textNode);
            }
            textNode.textContent += ch;
          }

          charIdx++;
          if (charIdx >= fullText.length) {
            lineSpan.textContent; // flush
            lineIdx++;
            charIdx = 0;
            setTimeout(next, CHAR_DELAY * 2); // tiny pause between lines
          } else {
            setTimeout(next, CHAR_DELAY);
          }
        }

        next();
      }

      function runBoot() {
        if (alreadyShown()) {
          bootEl.style.display = 'none';
          return;
        }

        typeLines(BOOT_LINES, () => {
          cursorEl.style.display = 'none';
          markShown();
          setTimeout(() => {
            bootEl.classList.add('ctf-fade-out');
            bootEl.addEventListener('transitionend', () => {
              bootEl.style.display = 'none';
            }, { once: true });
          }, POST_PAUSE);
        });
      }

      // Wait for DOM to be fully ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runBoot);
      } else {
        runBoot();
      }

    })();
    </script>

  </body>
</html>
