<script>
(function () {
  'use strict';

  /* ─── MATRIX RAIN ─── */
  const canvas = document.getElementById('matrix-canvas');
  const ctx    = canvas.getContext('2d');
  const CHARS  = '0123456789ABCDEFアイウエカキクサシスセタチネノハヒフヘホマミムメモ';
  let cols, drops, paused = false;
  function resizeMatrix() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols  = Math.floor(canvas.width / 14);
    drops = Array.from({ length: cols }, () => Math.random() * -canvas.height / 14);
  }
  function drawMatrix() {
    if (!paused) {
      ctx.fillStyle = 'rgba(10,10,10,0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drops.forEach((y, i) => {
        ctx.fillStyle = Math.random() > 0.9 ? '#00ff41' : '#006b1b';
        ctx.font = '13px "JetBrains Mono",monospace';
        ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * 14, y * 14);
        if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.6;
      });
    }
    requestAnimationFrame(drawMatrix);
  }
  window.addEventListener('resize', resizeMatrix);
  document.addEventListener('visibilitychange', () => { paused = document.hidden; });
  resizeMatrix(); drawMatrix();

  /* ─── DOM ─── */
  const output = document.getElementById('output');
  const input  = document.getElementById('cmd-input');
  const wrapEl = document.getElementById('terminal-wrapper');
  document.getElementById('btn-close').addEventListener('click', () => runCommand('exit'));

  /* ─── HELPERS ─── */
  function span(cls, text) {
    const s = document.createElement('span');
    s.className = 'line ' + (cls || '');
    s.textContent = text;
    return s;
  }
  function raw(html) {
    const s = document.createElement('span');
    s.className = 'line';
    s.innerHTML = html;
    return s;
  }
  function blank() {
    const d = document.createElement('span');
    d.className = 'line-blank';
    return d;
  }
  function print(el)          { output.appendChild(el); output.scrollTop = output.scrollHeight; }
  function println(cls, text) { print(span(cls, text)); }
  function printRaw(html)     { print(raw(html)); }
  function printBlank()       { print(blank()); }

  /* ─── TYPEWRITER (used by page modules) ─── */
  function typewrite(lines, charDelay, lineDelay, onDone) {
    let li = 0;
    function nextLine() {
      if (li >= lines.length) { if (onDone) onDone(); return; }
      const def = lines[li++];
      if (def === null) { printBlank(); setTimeout(nextLine, lineDelay * 0.3); return; }
      const cls   = def.cls  || '';
      const text  = def.text || '';
      const delay = def.delay !== undefined ? def.delay : charDelay;
      const lineEl = document.createElement('span');
      lineEl.className = 'line ' + cls;
      output.appendChild(lineEl);
      let ci = 0;
      (function nextChar() {
        if (ci >= text.length) { output.scrollTop = output.scrollHeight; setTimeout(nextLine, lineDelay); return; }
        lineEl.textContent += text[ci++];
        output.scrollTop = output.scrollHeight;
        setTimeout(nextChar, delay);
      })();
    }
    nextLine();
  }

  /* ─── HISTORY ─── */
  const history = []; let histIdx = -1;
  const COMMANDS = ['help','about','skills','projects','experience','education','tools','social','contact','whoami','ls','clear','exit'];
  window.exited = false;

  /* ─── LOADER ─── */
  async function loadCommand(cmdName) {
    try {
      if (cmdName === 'dir') cmdName = 'ls';
      const resp = await fetch(`pages/${cmdName}.js`);
      if (!resp.ok) throw new Error();
      const text = await resp.text();
      const fn = new Function(
        'printBlank','println','printRaw','print','span','raw','blank','output','document','window',
        text + `\ntry{return cmd${cmdName[0].toUpperCase()+cmdName.slice(1)}()}catch(e){return window['cmd${cmdName[0].toUpperCase()+cmdName.slice(1)}']?window['cmd${cmdName[0].toUpperCase()+cmdName.slice(1)}']():cmdLs()}`
      );
      fn(printBlank, println, printRaw, print, span, raw, blank, output, document, window);
    } catch(e) {
      printBlank(); println('c-red', `Failed to load '${cmdName}'.`); printBlank();
    }
  }

  async function runCommand(rawCmd) {
    const cmd = rawCmd.trim().toLowerCase();
    if (!cmd) return;
    if (cmd !== '__boot__') {
      const echo = document.createElement('span');
      echo.className = 'cmd-echo line';
      echo.textContent = rawCmd.trim();
      print(echo);
    }
    const map = { help:1,whoami:1,ls:1,dir:1,about:1,skills:1,projects:1,experience:1,education:1,tools:1,social:1,contact:1,clear:1,exit:1 };
    if (map[cmd]) await loadCommand(cmd === 'dir' ? 'ls' : cmd);
    else {
      printBlank();
      println('c-red', `'${rawCmd.trim()}' is not recognized as an internal or external command,`);
      println('c-red', 'operable program or batch file.');
      println('c-dim', "Type 'help' to see available commands.");
      printBlank();
    }
    output.scrollTop = output.scrollHeight;
  }

  /* ─── INPUT ─── */
  input.addEventListener('keydown', e => {
    if (window.exited) return;
    if (e.key === 'Enter') {
      const val = input.value;
      if (val.trim()) { history.unshift(val); histIdx = -1; }
      input.value = ''; runCommand(val);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0); }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; input.value = history[histIdx]; } else { histIdx = -1; input.value = ''; }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const p = input.value.trim().toLowerCase();
      const m = COMMANDS.find(c => c.startsWith(p));
      if (m) input.value = m;
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault(); output.innerHTML = ''; println('c-dim','[buffer cleared]'); printBlank();
    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault(); print(span('c-red','^C')); printBlank(); input.value = '';
    }
  });
  wrapEl.addEventListener('click', () => { if (!window.getSelection().toString()) input.focus(); });

  /* ════════════════════════════════════════════════════

    { at: 644, html:'<span class="c-dim">0x0020  </span><span style="color:#c084fc">20 72 75 6e 20 69 6e 20  44 4f 53 20 6d 6f 64 65</span>  <span style="color:#00d4ff"> run in DOS mode</span>' },
    { at: 660, html:'<span style="color:#00d4ff">DECRYPTED → </span><span class="c-green">Arya Koner  |  Mr. Malman  |  Cybersecurity Researcher</span>' },

    // ── privs

    { at: 770, html:'<span class="c-yellow">SeTakeOwnershipPrivilege  </span><span class="c-green bold">ENABLED</span>' },

    // ── hash dump

    { at: 858, html:'<span class="c-dim">victim:       </span><span style="color:#c084fc">1001:aad3b435b51404ee:8846f7eaee8fb117ad06bdd830b7586c:::</span>' },
    { at: 876, cls:'c-green', text:'[+] 4 accounts compromised' },

    // ── pivot + persistence

    { at: 980, cls:'c-green', text:'[+] Backdoor installed. Session encrypted. 3-hop TOR routed.' },
    { at:1005, html:'<span class="c-dim">malworld\\mal-operator  SID: S-1-5-21-3457823498-1337-4444-500</span>' },
    { at:1028, html:'<span class="c-dim">Logon: </span><span class="c-green">' + NOW + ' UTC</span>' },
  ]);

  // ── ACCESS GRANTED banner at 1180ms
  setTimeout(() => {
    printBlank();
    [
      { t:'╔══════════════════════════════════════════════════════════╗', bold:false },
      { t:'║  ACCESS GRANTED — MALWORLD TERMINAL v2.0                ║', bold:true  },
      { t:"║  You're inside. Type 'help' to begin reconnaissance.    ║", bold:false },
      { t:'╚══════════════════════════════════════════════════════════╝', bold:false },
    ].forEach((l, i) => {
      setTimeout(() => {
        const el = document.createElement('span');
        el.className = 'line c-green' + (l.bold ? ' bold' : '');
        el.style.cssText = 'animation:access-pulse 1.6s ease-in-out infinite;';
        el.textContent = l.t;
        output.appendChild(el);
        output.scrollTop = output.scrollHeight;
      }, i * 50);
    });
  }, 1180);

  // ── unlock at 1600ms
  setTimeout(() => {
    printBlank();
    document.body.classList.remove('booting');
    input.disabled = false;
    input.focus();
  }, 1600);

  // inject keyframe so inline style animation works
  const ks = document.createElement('style');
  ks.textContent = `@keyframes access-pulse{0%,100%{text-shadow:0 0 6px #00ff41,0 0 20px #00ff4155}50%{text-shadow:0 0 18px #00ff41,0 0 48px #00ff41bb}}`;
  document.head.appendChild(ks);

})();
</script>
