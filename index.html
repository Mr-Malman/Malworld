<html lang="en">
<head>

  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

</head>
<body>

<!-- MATRIX RAIN CANVAS -->
<canvas id="matrix-canvas"></canvas>

<!-- WINDOW CHROME -->
<div id="window-chrome">
  <div class="title-left">
    <div class="cmd-icon">C:</div>
    <span class="title-text">cmd.exe — MALWORLD\C:\Windows\System32</span>
  </div>
  <div class="win-btns">
    <button class="win-btn" title="Minimize">─</button>
    <button class="win-btn" title="Maximize">□</button>
    <button class="win-btn close" title="Close" id="btn-close">✕</button>
  </div>
</div>

<!-- TERMINAL WRAPPER -->
<div id="terminal-wrapper">
  <div id="output"></div>
  <div id="input-row">
    <span id="prompt-label">C:\\Users\\victim&gt;&nbsp;</span>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="none" spellcheck="false" autofocus
           aria-label="Terminal input" />
  </div>
</div>
<script>

(function () {
  'use strict';

  /* ══════════════════════════════════════════════════════════════
     MATRIX RAIN
  ══════════════════════════════════════════════════════════════ */
  const canvas = document.getElementById('matrix-canvas');
  const ctx    = canvas.getContext('2d');
  const HEX    = '0123456789ABCDEFアイウエカキクサシスセタチネノハヒフヘホマミムメモ';
  let cols, drops, rafId, paused = false;

  function resizeMatrix() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols  = Math.floor(canvas.width / 14);
    drops = Array.from({ length: cols }, () => Math.random() * -canvas.height / 14);
  }

  function drawMatrix() {
    if (paused) { rafId = requestAnimationFrame(drawMatrix); return; }
    ctx.fillStyle = 'rgba(10,10,10,0.04)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drops.forEach((y, i) => {
      const bright = Math.random() > 0.9;
      ctx.fillStyle = bright ? '#00ff41' : '#006b1b';
      ctx.font = '13px "JetBrains Mono", monospace';
      ctx.fillText(HEX[Math.floor(Math.random() * HEX.length)], i * 14, y * 14);
      if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i] += 0.6;
    });
    rafId = requestAnimationFrame(drawMatrix);
  }

  window.addEventListener('resize', resizeMatrix);
  document.addEventListener('visibilitychange', () => { paused = document.hidden; });
  resizeMatrix();
  rafId = requestAnimationFrame(drawMatrix);

  /* ══════════════════════════════════════════════════════════════
     DOM REFS
  ══════════════════════════════════════════════════════════════ */
  const output    = document.getElementById('output');
  const input     = document.getElementById('cmd-input');
  const wrapEl    = document.getElementById('terminal-wrapper');

  document.getElementById('btn-close').addEventListener('click', () => {
    runCommand('exit');
  });

  /* ══════════════════════════════════════════════════════════════
     PRINT HELPERS
  ══════════════════════════════════════════════════════════════ */
  function span(cls, text) {
    const s = document.createElement('span');
    s.className = 'line ' + (cls || '');
    s.textContent = text;
    return s;
  }
  function raw(html) {
    const s = document.createElement('span');
    s.className = 'line';
    s.innerHTML = html;
    return s;
  }
  function blank() {
    const d = document.createElement('span');
    d.className = 'line-blank';
    return d;
  }
  function print(el) {
    output.appendChild(el);
    output.scrollTop = output.scrollHeight;
  }
  function println(cls, text) { print(span(cls, text)); }
  function printRaw(html)     { print(raw(html)); }
  function printBlank()       { print(blank()); }

  /* ══════════════════════════════════════════════════════════════
     TYPEWRITER ENGINE
  ══════════════════════════════════════════════════════════════ */
  function typewrite(lines, charDelay, lineDelay, onDone) {
    let li = 0;

    function nextLine() {
      if (li >= lines.length) { if (onDone) onDone(); return; }
      const def = lines[li++];
      if (def === null) { printBlank(); setTimeout(nextLine, lineDelay * 0.3); return; }

      const cls   = def.cls  || '';
      const text  = def.text || '';
      const delay = def.delay !== undefined ? def.delay : charDelay;

      const lineEl = document.createElement('span');
      lineEl.className = 'line ' + cls;
      output.appendChild(lineEl);

      let ci = 0;
      function nextChar() {
        if (ci >= text.length) { output.scrollTop = output.scrollHeight; setTimeout(nextLine, lineDelay); return; }
        lineEl.textContent += text[ci++];
        output.scrollTop = output.scrollHeight;
        setTimeout(nextChar, delay);
      }
      nextChar();
    }
    nextLine();
  }

  /* ══════════════════════════════════════════════════════════════
     COMMAND HISTORY
  ══════════════════════════════════════════════════════════════ */
  const history = [];
  let histIdx   = -1;

  /* ══════════════════════════════════════════════════════════════
     ALL COMMANDS
  ══════════════════════════════════════════════════════════════ */
  const COMMANDS = ['help','about','skills','projects','experience','education','tools','social','contact','whoami','ls','clear','exit'];

























  window.exited = false;

  /* ══════════════════════════════════════════════════════════════
     COMMAND ROUTER
  ══════════════════════════════════════════════════════════════ */
  
  async function loadCommand(cmdName) {
    try {
      if (cmdName === 'dir') cmdName = 'ls';
      const response = await fetch(`pages/${cmdName}.js`);
      if (!response.ok) throw new Error('Not found');
      const text = await response.text();
      // create a new function
      const fn = new Function('printBlank', 'println', 'printRaw', 'print', 'span', 'raw', 'blank', 'output', 'document', 'window', text + `\ntry { return cmd${cmdName.charAt(0).toUpperCase() + cmdName.slice(1)}(); } catch(e) { /* handle aliased names like ls */ return window['cmd' + cmdName.charAt(0).toUpperCase() + cmdName.slice(1)] ? window['cmd' + cmdName.charAt(0).toUpperCase() + cmdName.slice(1)]() : cmdLs(); }`);
      fn(printBlank, println, printRaw, print, span, raw, blank, output, document, window);
    } catch (e) {
        console.error(e);
        printBlank();
        println('c-red', `Failed to load command module '${cmdName}'.`);
        printBlank();
    }
  }

  async function runCommand(raw) {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;

    // Echo the typed command
    if (cmd !== '__boot__') {
      const echo = document.createElement('span');
      echo.className = 'cmd-echo line';
      echo.textContent = raw.trim();
      print(echo);
    }

    switch (cmd) {
      case 'help': await loadCommand('help'); break;
      case 'whoami': await loadCommand('whoami'); break;
      case 'ls':
      case 'dir': await loadCommand('dir'); break;
      case 'about': await loadCommand('about'); break;
      case 'skills': await loadCommand('skills'); break;
      case 'projects': await loadCommand('projects'); break;
      case 'experience': await loadCommand('experience'); break;
      case 'education': await loadCommand('education'); break;
      case 'tools': await loadCommand('tools'); break;
      case 'social': await loadCommand('social'); break;
      case 'contact': await loadCommand('contact'); break;
      case 'clear': await loadCommand('clear'); break;
      case 'exit': await loadCommand('exit'); break;
      default:
        printBlank();
        println('c-red', `'${raw.trim()}' is not recognized as an internal or external command,`);
        println('c-red', `operable program or batch file.`);
        println('c-dim', `Type 'help' to see available commands.`);
        printBlank();
    }
    output.scrollTop = output.scrollHeight;
  }

  /* ══════════════════════════════════════════════════════════════
     INPUT HANDLING
  ══════════════════════════════════════════════════════════════ */
  input.addEventListener('keydown', e => {
    if (window.exited) return;

    if (e.key === 'Enter') {
      const val = input.value;
      if (val.trim()) {
        history.unshift(val);
        histIdx = -1;
      }
      input.value = '';
      runCommand(val);

    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx < history.length - 1) {
        histIdx++;
        input.value = history[histIdx];
        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
      }

    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) {
        histIdx--;
        input.value = history[histIdx];
      } else {
        histIdx = -1;
        input.value = '';
      }

    } else if (e.key === 'Tab') {
      e.preventDefault();
      const partial = input.value.trim().toLowerCase();
      if (!partial) return;
      const match = COMMANDS.find(c => c.startsWith(partial));
      if (match) input.value = match;

    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      cmdClear();

    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault();
      const el = span('c-red', '^C');
      print(el);
      printBlank();
      input.value = '';
    }
  });

  // Click anywhere → focus input
  wrapEl.addEventListener('click', () => {
    if (!window.getSelection().toString()) input.focus();
  });

  /* ══════════════════════════════════════════════════════════════
     BOOT SEQUENCE
  ══════════════════════════════════════════════════════════════ */
  input.disabled = true;

  const BOOT_LINES = [
    { text: 'Microsoft Windows [Version 10.0.19045.4170]', cls: '', delay: 28 },
    { text: '(c) Microsoft Corporation. All rights reserved.', cls: 'c-dim', delay: 22 },
    null,
    { text: 'C:\\Windows\\System32>', cls: 'c-dim', delay: 20 },
    null,
    null,
    { text: '[*] Incoming connection from 192.168.1.47:4444', cls: 'c-yellow', delay: 22 },
    { text: '[*] Meterpreter session 1 opened (10.0.0.9:8080 -> 192.168.1.47:4444)', cls: 'c-yellow', delay: 18 },
    null,
    { text: 'meterpreter > shell', cls: 'c-green', delay: 55 },
    null,
    { text: 'Process 4821 created.', cls: 'c-dim', delay: 22 },
    { text: 'Channel 1 created.', cls: 'c-dim', delay: 22 },
    null,
    { text: 'C:\\Windows\\system32> whoami', cls: 'c-green', delay: 55 },
    { text: 'malworld\\mal-operator', cls: 'c-cyan bold', delay: 22 },
    null,
    { text: 'C:\\Windows\\system32> cd C:\\Users\\victim', cls: 'c-green', delay: 45 },
    null,
    { text: '╔══════════════════════════════════════════════════════════╗', cls: 'c-green', delay: 6 },
    { text: '║  ACCESS GRANTED — MALWORLD TERMINAL v2.0                ║', cls: 'c-green bold', delay: 6 },
    { text: '║  Type \'help\' to begin reconnaissance.                   ║', cls: 'c-green', delay: 6 },
    { text: '╚══════════════════════════════════════════════════════════╝', cls: 'c-green', delay: 6 },
    null,
  ];

  typewrite(BOOT_LINES, 22, 60, () => {
    input.disabled = false;
    input.focus();
  });

})();

</script>
</body>
